name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  integration:
    runs-on: ubuntu-latest
    # Runs on every push and PR — this suite only talks to a local Supabase
    # stack (no live Stripe API calls), so there is no external rate limit to
    # protect and no reason to gate it to main-only.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: supabase start

      - name: Capture Supabase credentials
        # Written to GITHUB_ENV so every later step gets it in process.env
        # directly — no re-threading through a step-level `env:` block, which
        # was a previous source of silent propagation bugs.
        run: |
          eval "$(supabase status --output env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> "$GITHUB_ENV"

      - name: Verify Supabase credentials are present
        # A missing/empty key here must fail the job, not silently degrade to
        # an all-skipped test run (see tests/integration/setup.ts skipIfNotLocal).
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is empty — local Supabase did not start correctly."
            exit 1
          fi

      - name: Run integration tests
        # Invoked via `pnpm exec vitest` directly (not the `test:integration`
        # package script) — pnpm does not reliably forward extra CLI flags
        # through a script's own `--` passthrough in this setup.
        run: pnpm exec vitest run --config vitest.integration.config.ts --reporter=verbose --reporter=json --outputFile=integration-results.json

      - name: Assert integration tests actually ran
        # Guards against a regression of the skip condition (or any other cause
        # of an all-skipped suite) silently passing CI again.
        run: |
          node -e '
            const r = require("./integration-results.json");
            const executed = r.numTotalTests - r.numPendingTests - r.numTodoTests;
            console.log(`Executed: ${executed}, Passed: ${r.numPassedTests}, Failed: ${r.numFailedTests}, Skipped: ${r.numPendingTests}`);
            if (executed < 15) {
              console.error(`Expected at least 15 executed integration tests, got ${executed}.`);
              process.exit(1);
            }
            if (r.numFailedTests > 0) {
              console.error(`${r.numFailedTests} integration test(s) failed.`);
              process.exit(1);
            }
          '
