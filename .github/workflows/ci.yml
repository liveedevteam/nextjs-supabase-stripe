name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  integration:
    # Runs on every push and PR — this suite only talks to a local Supabase
    # stack (no live Stripe API calls), so there is no external rate limit to
    # protect and no reason to gate it to main-only.
    uses: ./.github/workflows/_integration-tests.yml
